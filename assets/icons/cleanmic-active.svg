<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 16 16"
     width="16" height="16">
  <!--
    cleanmic-active.svg — Tray icon, active/enabled state.
    Uses currentColor so it adapts to light and dark panel themes.
    Mic body + stand + small green indicator dot in bottom-right corner.
  -->

  <!-- Microphone capsule body -->
  <rect x="5" y="1" width="6" height="8" rx="3"
        fill="currentColor"/>

  <!-- Mic stand arms (curved arc via path) -->
  <path d="M3,8 Q3,12 8,12 Q13,12 13,8"
        fill="none" stroke="currentColor" stroke-width="1.5"
        stroke-linecap="round"/>

  <!-- Mic stand vertical post -->
  <line x1="8" y1="12" x2="8" y2="14.5"
        stroke="currentColor" stroke-width="1.5"
        stroke-linecap="round"/>

  <!-- Base foot -->
  <line x1="5.5" y1="14.5" x2="10.5" y2="14.5"
        stroke="currentColor" stroke-width="1.5"
        stroke-linecap="round"/>

  <!--
    Active indicator: small filled green circle in bottom-right.
    Hard-coded green so it stands out even in symbolic contexts.
  -->
  <circle cx="13.5" cy="13.5" r="2"
          fill="#33d17a"
          class="indicator"/>
</svg>
